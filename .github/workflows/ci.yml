name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.26'
  # Pinned to match the local toolchain (golangci-lint 2.11.4) so the git
  # hooks, `task lint`, and CI all run the identical linter version.
  GOLANGCI_LINT_VERSION: 'v2.11.4'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            coverage: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Install libFLAC tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y flac

      - name: Run tests
        # -timeout 20m: the race-instrumented pcm suite (corpus re-encode plus
        # libFLAC cross-validation) runs LPC analysis at levels 3-8 and exceeds
        # the default 10m per-package timeout on CI runners.
        run: go test -race -timeout 20m ./...

      - name: Rice 32-bit overflow guard (Linux)
        if: runner.os == 'Linux'
        # The Rice cost accumulator must stay correct where int is 32 bits. Pure-Go
        # 386 test binaries run on the amd64 runner via the kernel's IA32 emulation;
        # CGO_ENABLED=0 keeps the build from needing a 32-bit libc. No -race: the
        # race detector does not support 386.
        env:
          CGO_ENABLED: '0'
          GOARCH: '386'
        run: go test ./internal/rice/...

      - name: Fuzz seed corpora (Linux)
        if: runner.os == 'Linux'
        run: |
          go test ./internal/bitio/ -run FuzzReadBits
          go test ./internal/meta/ -run FuzzReadMetadata
          go test ./internal/frame/ -run FuzzDecode

      - name: Run tests with coverage
        if: matrix.coverage
        # -coverpkg=./... credits cross-package coverage: the decoder internals
        # are exercised by the pcm corpus conformance tests, not by per-package
        # unit tests alone.
        run: go test -timeout 20m -coverpkg=./... -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  vet:
    name: Vet
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run go vet
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
