name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC. Re-scans against the latest vulnerability
    # database so newly disclosed CVEs in dependencies or the Go toolchain
    # surface even when the code itself has not changed.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26'
          # Always pull the newest scanner so the analysis tracks the latest
          # vulnerability database, not a pinned release.
          check-latest: true
