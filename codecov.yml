# Coverage is reported for visibility but does not gate merges. The real
# correctness gates for this clean-room codec are the IETF corpus conformance
# (decoded-audio MD5 vs STREAMINFO), libFLAC byte-for-byte cross-validation, and
# fuzzing; per-line coverage is a weak signal next to those.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
